<div class="login">
  <div class="login__container">
    <div class="login__hero">
      <p class="login__eyebrow">Autenticação Global</p>
      <h1 class="login__title">Acesse o <em>CondoMais</em></h1>
      <p class="login__subtitle">Uma única sessão para morador, portaria, administração e master-admin.</p>
    </div>

    <div class="login__card">
      <div class="login__form">
        @if (state.error()) {
          <p class="login__error">{{ state.error() }}</p>
        }

        <button
          class="login__btn login__btn--google"
          type="button"
          (click)="loginWithGoogle()"
          [disabled]="state.isLoading()"
        >
          Continuar com Google
        </button>

        <div class="login__divider">
          <span>OU</span>
        </div>

        <label class="login__field">
          <span class="login__label">E-mail</span>
          <input
            class="login__input"
            type="email"
            [(ngModel)]="email"
            placeholder="voce@condominio.com"
            [disabled]="state.isLoading()"
          />
        </label>

        <label class="login__field">
          <span class="login__label">Senha</span>
          <input
            class="login__input"
            type="password"
            [(ngModel)]="password"
            placeholder="Digite sua senha"
            [disabled]="state.isLoading()"
            (keyup.enter)="loginWithEmail()"
          />
        </label>

        <button
          class="login__btn login__btn--accent"
          type="button"
          (click)="loginWithEmail()"
          [disabled]="state.isLoading() || !email.trim() || !password.trim()"
        >
          {{ state.isLoading() ? 'Aguarde...' : 'Entrar com e-mail' }}
        </button>
      </div>
    </div>
  </div>
</div>
